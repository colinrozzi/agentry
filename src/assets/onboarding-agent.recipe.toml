# onboarding-agent — the recipe agentry seeds on `agentry init`.
#
# A `container` recipe is metadata plus a launch script. agentry runs launch.sh
# on `agentry start` (it does the podman run, mounts your Claude credentials in,
# trusts the workspace, and starts the agent), then owns the generic verbs:
#   agentry attach <name>   ->  podman attach agent-<id>
#   agentry list            ->  is the container running?
#   agentry stop <name>     ->  podman rm -f agent-<id>
# To run a different image, mount other things, or use a different harness, edit
# launch.sh — nothing here is baked into agentry.

name = "onboarding-agent"
description = "Meet agentry — an interactive guide to recipes, sessions, and the lifecycle"
claude_md_path = "./CLAUDE.md"
runtime = "container"

# The opening line, sent on your behalf as the agent's first prompt (launch.sh
# passes it to claude), so attaching drops you into an introduction.
message = """
Hi! I just ran `agentry start onboarding-agent` and attached — I'm new to \
agentry. Please introduce yourself, explain what agentry is and what you can \
help me do, then give me a quick tour of my setup: run `agentry recipes list` \
and `agentry list` (you have my control socket) and walk me through it. \
Friendly and concise, please.\
"""

# No launch/status/attach/teardown here: `container` supplies them. launch
# defaults to `sh {recipe_dir}/launch.sh`; override any verb if you need to.
